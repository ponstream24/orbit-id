name: Specification change
description: Propose a change to the Orbit ID format, generation rules, or normative docs
title: "[spec] "
labels: ["spec"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should change, and why?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Concrete scenarios this enables or fixes.
    validations:
      required: true
  - type: dropdown
    id: layout-impact
    attributes:
      label: Does this affect the 64-bit layout or wire format?
      options:
        - "No"
        - "Yes — compatibility and migration plan required"
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility / migration
      description: Required if layout or wire format changes. Otherwise write N/A.
      value: "N/A"
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Considered encode and decode directions
        - label: Considered clock rollback, overflow, and concurrency
        - label: Considered storage / JSON interchange impact
