name: Java quality check
description: Run Maven tests for packages/java

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"
        cache: maven

    - shell: bash
      working-directory: packages/java
      run: |
        set -euo pipefail
        mvn -B test
        mkdir -p ../../coverage
        cp target/site/jacoco/jacoco.xml ../../coverage/java-jacoco.xml
