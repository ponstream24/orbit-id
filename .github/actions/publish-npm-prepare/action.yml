name: Prepare npm publish
description: Build Orbit npm workspaces and upload dist artifacts for publish-npm

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v7
      with:
        node-version: "24"
        cache: npm

    - name: Upgrade npm for Trusted Publishing
      shell: bash
      run: npm install -g npm@latest

    - shell: bash
      run: npm ci

    - shell: bash
      run: npm run build

    - shell: bash
      run: npm test

    - shell: bash
      run: npm run typecheck

    - name: Upload package build outputs
      uses: actions/upload-artifact@v7
      with:
        name: package-dists
        path: |
          packages/core/dist
          packages/typescript/dist
          packages/cli/dist
        retention-days: 1
