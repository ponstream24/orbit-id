name: Rust quality check
description: Run Cargo tests for packages/rust

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov

    - shell: bash
      working-directory: packages/rust
      run: |
        set -euo pipefail
        mkdir -p ../../coverage
        cargo llvm-cov --lcov --output-path ../../coverage/rust.lcov
