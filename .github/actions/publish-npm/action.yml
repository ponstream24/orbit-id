name: Publish npm package
description: Publish one Orbit npm workspace package (skip if version already on npm)

inputs:
  package:
    description: Workspace directory (for example packages/core)
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v7
      with:
        node-version: "24"
        cache: npm

    - name: Upgrade npm for Trusted Publishing
      shell: bash
      run: npm install -g npm@latest

    - shell: bash
      run: npm ci

    - name: Download package build outputs
      uses: actions/download-artifact@v8
      with:
        name: package-dists

    - name: Publish package
      shell: bash
      run: |
        set -euo pipefail
        dir="${{ inputs.package }}"
        name="$(node -p "require('./${dir}/package.json').name")"
        ver="$(node -p "require('./${dir}/package.json').version")"
        if npm view "${name}@${ver}" version >/dev/null 2>&1; then
          echo "skip ${name}@${ver} (already on npm)"
        else
          echo "publish ${name}@${ver}"
          npm publish -w "${name}" --access public
        fi
