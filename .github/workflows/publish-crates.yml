name: Publish crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Skip if version already on crates.io
        id: skip
        run: |
          set -euo pipefail
          name="$(sed -n 's/^name = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          echo "crate=$name version=$ver"
          if curl -fsS -A 'orbit-id-ci' "https://crates.io/api/v1/crates/${name}/${ver}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip ${name}@${ver} (already on crates.io)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io (Trusted Publishing)
        if: steps.skip.outputs.skip != 'true'
        id: auth
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1

      - name: Require publish credentials
        if: steps.skip.outputs.skip != 'true'
        env:
          OIDC_TOKEN: ${{ steps.auth.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "${OIDC_TOKEN}" ] || [ -n "${CARGO_REGISTRY_TOKEN}" ]; then
            exit 0
          fi
          echo "::error::No crates.io credentials. First publish: set CARGO_REGISTRY_TOKEN, or configure Trusted Publishing for workflow publish-crates.yml — see docs/en/crates-io.md"
          exit 1

      - name: Publish to crates.io
        if: steps.skip.outputs.skip != 'true'
        working-directory: packages/rust
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
