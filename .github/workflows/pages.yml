name: Deploy Playground

on:
  push:
    branches: [main]
    paths:
      - "packages/playground/**"
      - "packages/core/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build -w @orbit-id/core
      - name: Build playground for GitHub Pages
        run: npm run build -w @orbit-id/playground
        env:
          GITHUB_PAGES: "true"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: packages/playground/dist-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
