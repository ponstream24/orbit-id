name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.changes.outputs.node }}
      go: ${{ steps.changes.outputs.go }}
      rust: ${{ steps.changes.outputs.rust }}
      java: ${{ steps.changes.outputs.java }}
      php: ${{ steps.changes.outputs.php }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: changes
        uses: ./.github/actions/detect-language-changes
        with:
          force_all: ${{ github.event_name != 'pull_request' }}
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.sha }}

  test:
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/quality-node
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-node
          path: coverage/
          if-no-files-found: error

  test-go:
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/quality-go
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-go
          path: coverage/
          if-no-files-found: error

  test-rust:
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/quality-rust
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-rust
          path: coverage/
          if-no-files-found: error

  test-java:
    needs: detect
    if: needs.detect.outputs.java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/quality-java
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-java
          path: coverage/
          if-no-files-found: error

  test-php:
    needs: detect
    if: needs.detect.outputs.php == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/quality-php
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-php
          path: coverage/
          if-no-files-found: error

  octocov:
    needs: [detect, test, test-go, test-rust, test-java, test-php]
    if: |
      always() &&
      !cancelled() &&
      (needs.test.result == 'success' ||
       needs.test-go.result == 'success' ||
       needs.test-rust.result == 'success' ||
       needs.test-java.result == 'success' ||
       needs.test-php.result == 'success') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.test-go.result == 'success' || needs.test-go.result == 'skipped') &&
      (needs.test-rust.result == 'success' || needs.test-rust.result == 'skipped') &&
      (needs.test-java.result == 'success' || needs.test-java.result == 'skipped') &&
      (needs.test-php.result == 'success' || needs.test-php.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true

      - name: Build octocov coverage paths
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find coverage -type f \( \
            -name 'lcov.info' -o \
            -name 'go.out' -o \
            -name 'rust.lcov' -o \
            -name 'java-jacoco.xml' -o \
            -name 'php-clover.xml' \
          \) | sort)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No coverage reports found"
            exit 1
          fi
          {
            echo "coverage:"
            echo "  exclude:"
            echo "    - '**/*.d.ts'"
            echo "    - '**/test/**'"
            echo "    - '**/tests/**'"
            echo "    - '**/*_test.go'"
            echo "    - '**/src/test/**'"
            echo "  paths:"
            for f in "${files[@]}"; do
              echo "    - ${f}"
            done
            echo
            echo "diff:"
            echo "  datastores:"
            echo "    - artifact://\${GITHUB_REPOSITORY}"
            echo
            echo "comment:"
            echo "  if: is_pull_request"
            echo
            echo "summary:"
            echo "  if: true"
            echo
            echo "report:"
            echo "  if: is_default_branch"
            echo "  datastores:"
            echo "    - artifact://\${GITHUB_REPOSITORY}"
          } > .octocov.ci.yml
          echo "Generated .octocov.ci.yml:"
          cat .octocov.ci.yml

      - uses: k1LoW/octocov-action@v1
        with:
          config: .octocov.ci.yml
