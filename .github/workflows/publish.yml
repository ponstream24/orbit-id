name: Publish

# Single entry for all registry publishes. Logic lives in
# .github/actions/publish-*.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  npm-prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/publish-npm-prepare

  npm:
    needs: npm-prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/core
          - packages/typescript
          - packages/cli
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/publish-npm
        with:
          package: ${{ matrix.package }}

  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/publish-crates
        with:
          cargo-registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/publish-maven
        with:
          maven-central-username: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          maven-central-password: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          maven-gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          maven-gpg-passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  packagist:
    runs-on: ubuntu-latest
    steps:
      # Disable checkout credential helper so PHP_SPLIT_TOKEN is not overridden by GITHUB_TOKEN.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/publish-packagist
        with:
          php-split-token: ${{ secrets.PHP_SPLIT_TOKEN }}
          packagist-username: ${{ secrets.PACKAGIST_USERNAME }}
          packagist-token: ${{ secrets.PACKAGIST_TOKEN }}
