name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run typecheck

      - name: Upload package build outputs
        uses: actions/upload-artifact@v7
        with:
          name: package-dists
          path: |
            packages/core/dist
            packages/typescript/dist
            packages/cli/dist
          retention-days: 1

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/core
          - packages/typescript
          - packages/cli
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - run: npm ci

      - name: Download package build outputs
        uses: actions/download-artifact@v8
        with:
          name: package-dists

      - name: Publish package
        run: |
          set -euo pipefail
          dir="${{ matrix.package }}"
          name="$(node -p "require('./${dir}/package.json').name")"
          ver="$(node -p "require('./${dir}/package.json').version")"
          if npm view "${name}@${ver}" version >/dev/null 2>&1; then
            echo "skip ${name}@${ver} (already on npm)"
          else
            echo "publish ${name}@${ver}"
            npm publish -w "${name}" --access public
          fi
